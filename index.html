<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>GGE with Virtual Touchpad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .iframe-container {
            position: relative;
            width: 100vw;
            height: 65vh;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .touch-indicator {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .touchpad {
            width: 100vw;
            height: 35vh;
            background: #222;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: Arial, sans-serif;
        }
        @media (orientation: landscape) {
            body {
                flex-direction: row;
            }
            .iframe-container {
                height: 100vh;
                width: 70vw;
            }
            .touchpad {
                height: 100vh;
                width: 30vw;
            }
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://empire.goodgamestudios.com/?nomobileredirect=true" allowfullscreen id="gameIframe"></iframe>
        <div class="touch-indicator" id="indicator"></div>
    </div>
    <div class="touchpad" id="touchpad">Touch here to move</div>

    <script>
        const indicator = document.getElementById('indicator');
        const touchpad = document.getElementById('touchpad');
        const iframe = document.getElementById('gameIframe').contentWindow;

        let lastTouchX = 0;
        let lastTouchY = 0;
        let mouseObject = {
            leftMouseDown: false,
            absoluteX: 0,
            absoluteY: 0
        };
        
        // Function to update the position of the touch indicator
        function updateIndicator(x, y) {
            indicator.style.transform = `translate(${x}px, ${y}px)`;
        }

        // Function to send events to the iframe using postMessage
        function sendMouseEvent(eventType) {
            const message = { 
                absoluteX: mouseObject.absoluteX, 
                absoluteY: mouseObject.absoluteY, 
                eventType: eventType,
                leftMouseDown: mouseObject.leftMouseDown
            };
            iframe.postMessage(message, "*");
        }

        // Touchstart - register the start of a touch and update indicator position
        touchpad.addEventListener('touchstart', (event) => {
            event.preventDefault();
            const touch = event.touches[0];
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;

            mouseObject.absoluteX = lastTouchX;
            mouseObject.absoluteY = lastTouchY;
            updateIndicator(mouseObject.absoluteX, mouseObject.absoluteY);

            sendMouseEvent("mousemove"); // Hover effect
        });

        // Touchmove - register movement and update indicator position
        touchpad.addEventListener('touchmove', (event) => {
            event.preventDefault();
            const touch = event.touches[0];
            const diffX = touch.clientX - lastTouchX;
            const diffY = touch.clientY - lastTouchY;
            
            mouseObject.absoluteX += diffX;
            mouseObject.absoluteY += diffY;
            updateIndicator(mouseObject.absoluteX, mouseObject.absoluteY);

            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;

            sendMouseEvent("mousemove"); // Hover effect
        });

        // Click - simulate a left mouse click
        touchpad.addEventListener('click', (event) => {
            event.preventDefault();
            mouseObject.leftMouseDown = true;
            sendMouseEvent("click"); // Left click event
            mouseObject.leftMouseDown = false;
        });

        // Listen for messages from the iframe to debug or handle events if needed
        window.addEventListener("message", (event) => {
            console.log("Message received from iframe:", event.data);
        });
    </script>
</body>
</html>
