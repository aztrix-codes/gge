<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>GGE with Virtual Touchpad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .iframe-container {
            position: relative;
            width: 100vw;
            height: 65vh;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .touch-indicator {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .touchpad {
            width: 100vw;
            height: 35vh;
            background: #222;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: Arial, sans-serif;
        }
        @media (orientation: landscape) {
            body {
                flex-direction: row;
            }
            .iframe-container {
                height: 100vh;
                width: 70vw;
            }
            .touchpad {
                height: 100vh;
                width: 30vw;
            }
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://empire.goodgamestudios.com/?nomobileredirect=true" allowfullscreen id="gameIframe"></iframe>
        <div class="touch-indicator" id="indicator" style="display: none;"></div>
    </div>
    <div class="touchpad" id="touchpad">Touch here to move</div>

    <script>
        const indicator = document.getElementById('indicator');
        const touchpad = document.getElementById('touchpad');
        const iframe = document.getElementById('gameIframe').contentWindow;

        let mouseObject = {
            leftMouseDown: false,
            absoluteX: window.innerWidth / 2,
            absoluteY: window.innerHeight * 0.3
        };

        // Function to update the position of the touch indicator and ensure it's visible
        function updateIndicator(x, y) {
            indicator.style.display = 'block';
            indicator.style.left = `${x}px`;
            indicator.style.top = `${y}px`;
        }

        // Function to send events to the iframe using postMessage
        function sendMouseEvent(eventType) {
            const message = {
                absoluteX: mouseObject.absoluteX,
                absoluteY: mouseObject.absoluteY,
                eventType: eventType,
                leftMouseDown: mouseObject.leftMouseDown
            };
            iframe.postMessage(message, "*");
        }

        // Listen for touch events on the touchpad
        touchpad.addEventListener('touchstart', (event) => {
            event.preventDefault();
            const touch = event.touches[0];
            mouseObject.absoluteX = touch.clientX;
            mouseObject.absoluteY = touch.clientY;

            updateIndicator(mouseObject.absoluteX, mouseObject.absoluteY);
            sendMouseEvent("mousemove"); // Hover effect
        });

        touchpad.addEventListener('touchmove', (event) => {
            event.preventDefault();
            const touch = event.touches[0];
            mouseObject.absoluteX = touch.clientX;
            mouseObject.absoluteY = touch.clientY;

            updateIndicator(mouseObject.absoluteX, mouseObject.absoluteY);
            sendMouseEvent("mousemove"); // Hover effect
        });

        // Simulate a left click on touchpad tap
        touchpad.addEventListener('click', (event) => {
            event.preventDefault();
            mouseObject.leftMouseDown = true;
            sendMouseEvent("click"); // Left-click event
            mouseObject.leftMouseDown = false;
        });
    </script>
</body>
</html>
