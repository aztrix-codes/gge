<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>GGE with Virtual Touchpad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Fullscreen iframe for game */
        .iframe-container {
            position: relative;
            width: 100vw;
            height: 60vh; /* Set to 60% of viewport height */
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Cursor that appears over iframe */
        .virtual-cursor {
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* Touchpad area */
        .touchpad {
            width: 100vw;
            height: 40vh; /* Set to 40% of viewport height */
            background: #222;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>
    <!-- Container for the iframe and virtual cursor -->
    <div class="iframe-container">
        <iframe src="https://empire.goodgamestudios.com/?nomobileredirect=true" allowfullscreen></iframe>
        <div class="virtual-cursor" id="cursor"></div>
    </div>

    <!-- Touchpad area -->
    <div class="touchpad" id="touchpad">Touch here to move the cursor</div>

    <script>
        const cursor = document.getElementById('cursor');
        const touchpad = document.getElementById('touchpad');

        // Initialize cursor position
        let cursorX = window.innerWidth / 2; // Start cursor in the middle
        let cursorY = window.innerHeight * 0.3; // Start cursor near the top (within iframe)
        let lastTouchX = cursorX; // Track last touch position
        let lastTouchY = cursorY;

        // Update cursor position
        function updateCursor() {
            cursor.style.transform = `translate(${cursorX}px, ${cursorY}px)`;
        }

        // Listen for touch events on the touchpad
        touchpad.addEventListener('touchstart', (event) => {
            event.preventDefault();
            const touch = event.touches[0];
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
        });

        touchpad.addEventListener('touchmove', (event) => {
            event.preventDefault();
            const touch = event.touches[0];

            // Calculate the movement
            const movementX = touch.clientX - lastTouchX;
            const movementY = touch.clientY - lastTouchY;

            // Update cursor position based on touch movement
            cursorX += movementX;
            cursorY += movementY;

            // Boundary limits
            cursorX = Math.max(0, Math.min(window.innerWidth, cursorX));
            cursorY = Math.max(0, Math.min(window.innerHeight * 0.6, cursorY)); // Adjusted to 60% height

            // Update the cursor position and last touch position
            updateCursor();
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
        });

        // Initialize cursor position
        updateCursor();
    </script>
</body>

</html>
