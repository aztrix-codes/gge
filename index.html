<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>GGE with Virtual Touchpad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Fullscreen iframe for game */
        .iframe-container {
            position: relative;
            width: 100vw;
            height: 65vh; /* Set to 60% of viewport height */
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Touch indicator */
        .touch-indicator {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none; /* Prevent this from blocking touch events */
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* Touchpad area */
        .touchpad {
            width: 100vw;
            height: 35vh; /* Set to 40% of viewport height */
            background: #222;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: Arial, sans-serif;
        }

        @media (orientation: landscape) {
            body {
                flex-direction: row;
            }

            /* Adjust iframe and touchpad size for landscape view */
            .iframe-container {
                height: 100vh;
                width: 70vw;
            }

            .touchpad {
                height: 100vh;
                width: 30vw;
            }
        }

    </style>
</head>

<body>
    <!-- Container for the iframe and touch indicator -->
    <div class="iframe-container">
        <iframe src="https://empire.goodgamestudios.com/?nomobileredirect=true" allowfullscreen></iframe>
        <div class="touch-indicator" id="indicator"></div>
    </div>

    <!-- Touchpad area -->
    <div class="touchpad" id="touchpad">Touch here to move</div>

    <script>
        const indicator = document.getElementById('indicator');
        const touchpad = document.getElementById('touchpad');

        // Initialize position of the touch indicator
        let indicatorX = window.innerWidth / 2; // Start in the middle
        let indicatorY = window.innerHeight * 0.3; // Start near the top (within iframe)

        // Update indicator position
        function updateIndicator(x, y) {
            indicator.style.transform = `translate(${x}px, ${y}px)`;
        }

        // Listen for touch events on the touchpad
        touchpad.addEventListener('touchstart', (event) => {
            event.preventDefault();
            const touch = event.touches[0];
            indicatorX = touch.clientX;
            indicatorY = touch.clientY;
            updateIndicator(indicatorX, indicatorY);
        });

        touchpad.addEventListener('touchmove', (event) => {
            event.preventDefault();
            const touch = event.touches[0];
            indicatorX = touch.clientX;
            indicatorY = touch.clientY;
            updateIndicator(indicatorX, indicatorY);
        });

        // Initialize the position of the touch indicator
        updateIndicator(indicatorX, indicatorY);
    </script>
</body>

</html>
