<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>GGE with Virtual Touchpad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .iframe-container {
            position: relative;
            width: 100vw;
            height: 65vh;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .touch-indicator {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .touchpad {
            width: 100vw;
            height: 35vh;
            background: #222;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: Arial, sans-serif;
        }
        @media (orientation: landscape) {
            body {
                flex-direction: row;
            }
            .iframe-container {
                height: 100vh;
                width: 70vw;
            }
            .touchpad {
                height: 100vh;
                width: 30vw;
            }
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://empire.goodgamestudios.com/?nomobileredirect=true" allowfullscreen id="gameIframe"></iframe>
        <div class="touch-indicator" id="indicator"></div>
    </div>
    <div class="touchpad" id="touchpad">Touch here to move</div>

    <script>
        const indicator = document.getElementById('indicator');
        const touchpad = document.getElementById('touchpad');
        const iframe = document.getElementById('gameIframe').contentWindow;

        // Initialize position of the touch indicator
        let indicatorX = window.innerWidth / 2;
        let indicatorY = window.innerHeight * 0.3;

        // Update indicator position
        function updateIndicator(x, y) {
            indicator.style.transform = `translate(${x}px, ${y}px)`;
        }

        // Simulate mouse hover and click inside the iframe
        function simulateMouseEvent(type, x, y) {
            const event = new MouseEvent(type, {
                bubbles: true,
                cancelable: true,
                clientX: x,
                clientY: y,
                view: window
            });
            iframe.dispatchEvent(event);
        }

        // Listen for touch events on the touchpad
        touchpad.addEventListener('touchstart', (event) => {
            event.preventDefault();
            const touch = event.touches[0];
            indicatorX = touch.clientX;
            indicatorY = touch.clientY;
            updateIndicator(indicatorX, indicatorY);

            // Simulate hover
            simulateMouseEvent('mousemove', indicatorX, indicatorY);
        });

        touchpad.addEventListener('touchmove', (event) => {
            event.preventDefault();
            const touch = event.touches[0];
            indicatorX = touch.clientX;
            indicatorY = touch.clientY;
            updateIndicator(indicatorX, indicatorY);

            // Simulate hover
            simulateMouseEvent('mousemove', indicatorX, indicatorY);
        });

        touchpad.addEventListener('click', (event) => {
            event.preventDefault();
            // Simulate left click inside iframe at the last hover position
            simulateMouseEvent('click', indicatorX, indicatorY);
        });
    </script>
</body>
</html>
